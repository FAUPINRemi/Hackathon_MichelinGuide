services:
  ui:
    build:
      context: .
      dockerfile: docker/DockerfileUI
    container_name: michelin-ui
    env_file:
      - ./env/.env
    environment:
      - VITE_API_TARGET=http://server:3000
    ports:
      - "${UI_PORT:-5173}:5173"
    depends_on:
      - server

  server:
    build:
      context: .
      dockerfile: docker/DockerfileServer
    container_name: michelin-server
    env_file:
      - ./env/.env
    environment:
      - DB_HOST=db
    ports:
      - "${SERVER_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy

  db:
    build:
      context: .
      dockerfile: docker/DockerfileDB
    container_name: michelin-db
    restart: unless-stopped
    env_file:
      - ./env/.env
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: michelin-adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy

  importer:
    build:
      context: .
      dockerfile: docker/DockerfileImporter
    container_name: michelin-importer
    env_file:
      - ./env/.env
    environment:
      - DB_HOST=db
    volumes:
      - ./bdd:/data:ro
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - import

volumes:
  db_data:
